<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Search System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef3f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    color:#0d6efd;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:15px;
}

input:focus{
    outline:none;
    border-color:#0d6efd;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

#result{
    margin-top:20px;
    text-align:left;
}

.card{
    background:#f8f9fa;
    border-left:5px solid #0d6efd;
    padding:15px;
    border-radius:8px;
}

.success{
    color:green;
    font-weight:bold;
    margin-bottom:10px;
}

.error{
    color:red;
    font-weight:bold;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>👨‍💼 Employee Search</h2>

<input type="number" id="empId" placeholder="Enter Employee ID">

<button onclick="findEmployee()">Search</button>

<div id="result"></div>

</div>

<script>

let employees = [
    {id:1001,name:"Rahul Sharma",department:"HR",position:"Manager"},
    {id:1005,name:"Priya Singh",department:"Finance",position:"Accountant"},
    {id:1010,name:"Arjun Kumar",department:"IT",position:"Developer"},
    {id:1015,name:"Sneha Patel",department:"Marketing",position:"Executive"},
    {id:1020,name:"Karan Mehta",department:"Sales",position:"Sales Lead"}
];

// Array of Employee IDs (must be sorted)
let employeeIds = employees.map(emp => emp.id);

function interpolationSearch(arr,target){

    let low = 0;
    let high = arr.length - 1;

    while(low <= high && target >= arr[low] && target <= arr[high]){

        if(low == high){
            if(arr[low] == target)
                return low;
            return -1;
        }

        let pos = low + Math.floor(
            ((target - arr[low]) * (high - low)) /
            (arr[high] - arr[low])
        );

        if(arr[pos] == target)
            return pos;

        if(arr[pos] < target)
            low = pos + 1;
        else
            high = pos - 1;
    }

    return -1;
}

function findEmployee(){

    let id = parseInt(document.getElementById("empId").value);

    if(isNaN(id)){
        document.getElementById("result").innerHTML =
        "<p class='error'>Please enter an Employee ID.</p>";
        return;
    }

    let index = interpolationSearch(employeeIds,id);

    if(index != -1){

        let emp = employees[index];

        document.getElementById("result").innerHTML = `
        <div class="card">
            <p class="success">✅ Employee Found</p>
            <p><b>Employee ID:</b> ${emp.id}</p>
            <p><b>Name:</b> ${emp.name}</p>
            <p><b>Department:</b> ${emp.department}</p>
            <p><b>Position:</b> ${emp.position}</p>
        </div>
        `;
    }
    else{

        document.getElementById("result").innerHTML =
        "<p class='error'>❌ Employee Not Found</p>";

    }
}

</script>

</body>
</html>
