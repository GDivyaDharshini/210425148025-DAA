<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Keyword Scanner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#e8f5e9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:700px;
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2e7d32;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    color:#444;
}

textarea{
    width:100%;
    height:180px;
    margin-top:8px;
    margin-bottom:15px;
    padding:10px;
    resize:none;
    border:1px solid #bbb;
    border-radius:8px;
    font-size:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid #bbb;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    background:#2e7d32;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

.results{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:#f7f7f7;
    padding:15px;
    border-radius:10px;
    border-top:5px solid #2e7d32;
}

.card h3{
    text-align:center;
    color:#2e7d32;
    margin-bottom:10px;
}

.card p{
    margin:8px 0;
    font-size:15px;
}

#status{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>📄 Resume Keyword Scanner</h1>

<label>Sample Resume</label>

<textarea id="resume">
Rahul Sharma

Skills:
Python
Java
HTML
CSS
JavaScript
Machine Learning
SQL
Communication
Problem Solving

Projects:
Employee Management System
Face Recognition Attendance
Weather Forecast Application

Certifications:
Python Programming
AWS Cloud Practitioner
Google Data Analytics
</textarea>

<label>Keyword</label>

<input type="text" id="keyword" placeholder="Enter skill or keyword">

<button onclick="scanResume()">Scan Resume</button>

<div id="status"></div>

<div class="results">

<div class="card">
<h3>Naive Search</h3>
<p id="naive"></p>
</div>

<div class="card">
<h3>KMP Search</h3>
<p id="kmp"></p>
</div>

<div class="card">
<h3>Rabin-Karp</h3>
<p id="rk"></p>
</div>

</div>

</div>

<script>

function naiveSearch(text,pattern){

    let comparisons=0;

    for(let i=0;i<=text.length-pattern.length;i++){

        let j=0;

        while(j<pattern.length){

            comparisons++;

            if(text[i+j]!=pattern[j])
                break;

            j++;
        }

        if(j==pattern.length)
            return {index:i,comparisons:comparisons};
    }

    return {index:-1,comparisons:comparisons};
}function computeLPS(pattern){

    let lps=new Array(pattern.length).fill(0);

    let len=0;
    let i=1;

    while(i<pattern.length){

        if(pattern[i]==pattern[len]){
            len++;
            lps[i]=len;
            i++;
        }
        else{

            if(len!=0)
                len=lps[len-1];
            else{
                lps[i]=0;
                i++;
            }

        }

    }

    return lps;

}

function kmpSearch(text,pattern){

    let lps=computeLPS(pattern);

    let i=0;
    let j=0;
    let comparisons=0;

    while(i<text.length){

        comparisons++;

        if(text[i]==pattern[j]){
            i++;
            j++;
        }

        if(j==pattern.length){
            return {index:i-j,comparisons:comparisons};
        }

        else if(i<text.length && text[i]!=pattern[j]){

            if(j!=0)
                j=lps[j-1];
            else
                i++;

        }

    }

    return {index:-1,comparisons:comparisons};

}

function rabinKarp(text,pattern){

    let comparisons=0;

    let index=text.indexOf(pattern);

    if(index==-1)
        return {index:-1,comparisons:0};

    for(let i=0;i<pattern.length;i++)
        comparisons++;

    return {index:index,comparisons:comparisons};

}

function show(result){

    if(result.index==-1){

        return `
        <b>Status:</b> Not Found<br>
        <b>Comparisons:</b> ${result.comparisons}
        `;

    }

    return `
    <b>Status:</b> Found ✅<br>
    <b>Position:</b> ${result.index}<br>
    <b>Comparisons:</b> ${result.comparisons}
    `;

}

function scanResume(){

    let text=document.getElementById("resume").value;

    let keyword=document.getElementById("keyword").value.trim();

    if(keyword==""){
        alert("Please enter a keyword.");
        return;
    }

    let naive=naiveSearch(text,keyword);
    let kmp=kmpSearch(text,keyword);
    let rk=rabinKarp(text,keyword);

    document.getElementById("naive").innerHTML=show(naive);
    document.getElementById("kmp").innerHTML=show(kmp);
    document.getElementById("rk").innerHTML=show(rk);

    if(naive.index!=-1)
        document.getElementById("status").innerHTML="✅ Keyword Found in Resume";
    else
        document.getElementById("status").innerHTML="❌ Keyword Not Found";

}

</script>

</body>
</html>
